name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: restaurant-call-ai
  REGION: asia-northeast1
  SERVICE: shifty

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --source . \
            --project=$PROJECT_ID \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --set-env-vars="STORAGE_BACKEND=firestore,FLASK_ENV=production,SITE_URL=https://shifty.in-dx.jp,STORAGE_COLLECTION_PREFIX=shifty,TENANT_NAME=default,GMAIL_USER=admin@in-dx.jp,NOTIFY_TO=support@in-dx.jp,STRIPE_PRICE_STARTER=${{ vars.STRIPE_PRICE_STARTER }},STRIPE_PRICE_STANDARD=${{ vars.STRIPE_PRICE_STANDARD }},STRIPE_PRICE_PRO=${{ vars.STRIPE_PRICE_PRO }}" \
            --set-secrets="SECRET_KEY=SHIFTY_SECRET_KEY:latest,GMAIL_APP_PASSWORD=GMAIL_APP_PASSWORD:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest" \
            --quiet

      - name: Run health check
        run: |
          URL=$(gcloud run services describe $SERVICE \
            --project=$PROJECT_ID --region=$REGION \
            --format="value(status.url)")
          echo "✅ Deployed to: $URL"

          # 主要エンドポイント疎通確認
          for path in "/" "/app" "/staff" "/demo" "/help" "/api/auth/status"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 30 "$URL$path")
            if [ "$CODE" = "200" ]; then
              echo "  ✓ $CODE $path"
            else
              echo "  ✗ $CODE $path"
              exit 1
            fi
          done
          echo "🎉 全エンドポイント正常稼働"
