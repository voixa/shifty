name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: restaurant-call-ai
  REGION: asia-northeast1
  SERVICE: shifty

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        # жҺЁеҘЁ: Workload Identity Federation зөҢз”ұгҒ§иӘҚиЁј
        # secrets.GCP_WORKLOAD_IDENTITY_PROVIDER гҒЁ GCP_SERVICE_ACCOUNT гӮ’ Repo secrets гҒ«зҷ»йҢІ
        # гғ•гӮ©гғјгғ«гғҗгғғгӮҜ: GCP_SA_KEY (JSON йҚө) гҒ§гӮӮеҸҜпјҲйқһжҺЁеҘЁпјү
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --source . \
            --project=$PROJECT_ID \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --set-env-vars="STORAGE_BACKEND=firestore,FLASK_ENV=production" \
            --set-secrets="SECRET_KEY=SHIFTY_SECRET_KEY:latest" \
            --quiet

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe $SERVICE \
            --project=$PROJECT_ID --region=$REGION \
            --format="value(status.url)")
          echo "вң… Deployed to: $URL"
          echo "DEPLOY_URL=$URL" >> $GITHUB_ENV
