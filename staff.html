<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- セキュリティ: トークンを含む URL の Referer 漏洩を防ぐ -->
  <meta name="referrer" content="no-referrer" />
  <meta name="robots" content="noindex,nofollow" />
  <title>シフト希望入力</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { 50:'#eef2ff',100:'#e0e7ff',500:'#6366f1',600:'#4f46e5',700:'#4338ca' } },
        fontFamily: { sans: ['"Hiragino Sans"','"Yu Gothic"','Meiryo','system-ui','sans-serif'] } } }
    }
  </script>
  <script>
    // Round 25 TOP 3: dark mode early apply
    (function () {
      try {
        const saved = localStorage.getItem("shifty.theme") || "auto";
        if (saved === "dark" || (saved === "auto" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch (_) {}
    })();
  </script>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen">
  <!-- Round 35 TOP 1: オフラインバナー -->
  <div id="offlineBanner" class="offline-banner" role="status" aria-live="polite">
    📡 ネットワークが切れています。再接続を待っています…
  </div>
  <script>
    (function() {
      const b = document.getElementById("offlineBanner");
      function update() {
        if (navigator.onLine) b.classList.remove("visible");
        else b.classList.add("visible");
      }
      window.addEventListener("online", update);
      window.addEventListener("offline", update);
      update();
    })();
  </script>
  <div id="app" class="max-w-md mx-auto p-4 pb-32"></div>
  <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-50 space-y-2"></div>
  <script src="js/api.js"></script>
  <script src="js/staff-portal.js"></script>
  <script>
    // PWA Service Worker 登録 (Round 21 TOP 3)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW reg failed', err));
      });
    }
    // beforeinstallprompt キャプチャ (Android Chrome) — staff-portal.js で利用
    window.__SHIFTY_INSTALL_PROMPT__ = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.__SHIFTY_INSTALL_PROMPT__ = e;
      window.dispatchEvent(new CustomEvent('shifty-install-available'));
    });
    window.addEventListener('appinstalled', () => {
      window.__SHIFTY_INSTALL_PROMPT__ = null;
      try { localStorage.setItem('shifty.installed', '1'); } catch (_) {}
    });
  </script>
</body>
</html>
