<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shifty — AIシフト自動作成</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- QR コード生成 (Round 14) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='52'%3E📅%3C/text%3E%3C/svg%3E" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Shifty" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <script>
    tailwind.config = {
      darkMode: 'class', // Round 25 TOP 3: class-based dark mode
      theme: {
        extend: {
          colors: { brand: { 50:'#eef2ff', 100:'#e0e7ff', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' } },
          fontFamily: { sans: ['"Hiragino Sans"','"Yu Gothic"','Meiryo','system-ui','sans-serif'] }
        }
      }
    }
  </script>
  <script>
    // Round 25 TOP 3: dark mode early apply (FOUC 防止)
    (function () {
      try {
        const saved = localStorage.getItem("shifty.theme") || "auto";
        if (saved === "dark" || (saved === "auto" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch (_) {}
    })();
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen">

  <!-- Round 28 TOP 3: Skip link (アクセシビリティ) -->
  <a href="#main" class="skip-link">メインコンテンツへスキップ</a>

  <!-- Round 35 TOP 1: オフライン検知バナー -->
  <div id="offlineBanner" class="offline-banner" role="status" aria-live="polite">
    📡 ネットワークが切れています。再接続を待っています…
  </div>
  <script>
    (function() {
      const b = document.getElementById("offlineBanner");
      function update() {
        if (navigator.onLine) b.classList.remove("visible");
        else b.classList.add("visible");
      }
      window.addEventListener("online", update);
      window.addEventListener("offline", update);
      update();
    })();
  </script>

  <!-- Auth Overlay -->
  <div id="authOverlay" class="hidden fixed inset-0 z-[60] bg-slate-100 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl p-8 w-full max-w-md">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 bg-gradient-to-br from-brand-500 to-brand-700 rounded-lg flex items-center justify-center text-white text-xl font-bold">S</div>
        <h1 class="text-2xl font-bold">Shifty</h1>
      </div>

      <!-- Setup mode -->
      <div id="authSetup" class="hidden">
        <h2 class="text-lg font-semibold mb-1">初回セットアップ</h2>
        <p class="text-sm text-slate-600 mb-4">オーナーパスワードを設定してください（6文字以上）</p>
        <input id="setupPass1" type="password" class="w-full border rounded-md px-3 py-2 mb-2" placeholder="パスワード" />
        <input id="setupPass2" type="password" class="w-full border rounded-md px-3 py-2 mb-2" placeholder="確認のため再入力" />
        <button id="setupBtn" class="w-full bg-brand-600 hover:bg-brand-700 text-white rounded-md py-2 font-semibold">セットアップ</button>
        <div id="setupErr" class="hidden text-sm text-red-600 mt-2"></div>
      </div>

      <!-- Login mode -->
      <div id="authLogin" class="hidden">
        <h2 class="text-lg font-semibold mb-1">ログイン</h2>
        <p class="text-sm text-slate-600 mb-4">オーナーパスワードを入力してください</p>
        <input id="loginPass" type="password" class="w-full border rounded-md px-3 py-2 mb-2" placeholder="パスワード" />
        <button id="loginBtn" class="w-full bg-brand-600 hover:bg-brand-700 text-white rounded-md py-2 font-semibold">ログイン</button>
        <div id="loginErr" class="hidden text-sm text-red-600 mt-2"></div>
      </div>
    </div>
  </div>

  <!-- Top bar -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-br from-brand-500 to-brand-700 rounded-lg flex items-center justify-center text-white text-lg font-bold">S</div>
        <div>
          <h1 class="font-bold text-lg leading-tight">Shifty</h1>
          <p class="text-xs text-slate-500" id="restaurantName">—</p>
        </div>
        <!-- 店舗スイッチャー (Round 26 = A) — 動的に表示 -->
        <div id="shopSwitcher" class="hidden ml-2 relative">
          <button id="shopSwitcherBtn" class="text-xs bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 rounded px-2 py-1 flex items-center gap-1" aria-haspopup="true" aria-expanded="false">
            <span>🏪</span>
            <span id="shopSwitcherLabel">店舗</span>
            <span>▾</span>
          </button>
          <div id="shopSwitcherDropdown" class="hidden absolute top-full left-0 mt-1 w-72 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg z-50"></div>
        </div>
      </div>

      <!-- Week navigator -->
      <div id="weekNav" class="flex items-center gap-1 text-sm bg-slate-50 rounded-lg p-1" role="navigation" aria-label="週ナビゲーション">
        <button id="prevWeekBtn" class="px-2 py-1 hover:bg-white rounded" aria-label="前の週へ" title="前の週へ">◀</button>
        <button id="weekJumpBtn" class="px-3 py-1 hover:bg-white rounded font-medium" aria-label="週をジャンプ" title="日付選択で週をジャンプ">—</button>
        <button id="nextWeekBtn" class="px-2 py-1 hover:bg-white rounded" aria-label="次の週へ" title="次の週へ">▶</button>
        <span id="weekStatusBadge" class="ml-1 text-xs px-2 py-0.5 rounded" aria-live="polite">—</span>
      </div>

      <div class="flex items-center gap-2">
        <button id="logoutBtn" class="text-xs text-slate-500 hover:text-red-600 px-2 py-1 rounded">ログアウト</button>
        <span class="hidden sm:inline-block text-xs bg-amber-100 text-amber-800 px-2 py-1 rounded">VOIXAアドオン</span>
      </div>
    </div>

    <nav class="max-w-7xl mx-auto px-2 overflow-x-auto" aria-label="メインタブ">
      <ul class="flex gap-1 text-sm" role="tablist">
        <li role="presentation"><button data-tab="dashboard"   class="tab-btn px-4 py-2.5 border-b-2 border-transparent" role="tab" aria-label="ホーム">🏠 ホーム</button></li>
        <li role="presentation"><button data-tab="staff"       class="tab-btn px-4 py-2.5 border-b-2 border-transparent" role="tab" aria-label="スタッフと希望">👥 スタッフ&希望</button></li>
        <li role="presentation"><button data-tab="schedule"    class="tab-btn px-4 py-2.5 border-b-2 border-transparent" role="tab" aria-label="シフト">📅 シフト</button></li>
        <li role="presentation"><button data-tab="settings"    class="tab-btn px-4 py-2.5 border-b-2 border-transparent" role="tab" aria-label="設定">⚙️ 設定</button></li>
      </ul>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6" id="main"></main>

  <div id="toast" class="fixed bottom-6 right-6 z-50 space-y-2"></div>

  <div id="modal" class="hidden fixed inset-0 z-40 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto" id="modalBody"></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/algorithm.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Sentry フロントエンド (DSN 設定時のみ)
    (function () {
      const dsn = '__SENTRY_DSN_FRONTEND__';
      if (dsn && dsn.indexOf('__') === -1 && dsn.length > 0) {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/@sentry/browser@8/bundles/bundle.min.js';
        s.crossOrigin = 'anonymous';
        s.onload = () => {
          if (window.Sentry) Sentry.init({ dsn, tracesSampleRate: 0.1 });
        };
        document.head.appendChild(s);
      }
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js');
          // 新SWが有効になったら一度だけリロードして最新化
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'activated' && navigator.serviceWorker.controller) {
                if (!sessionStorage.getItem('shifty-sw-reloaded')) {
                  sessionStorage.setItem('shifty-sw-reloaded', '1');
                  location.reload();
                }
              }
            });
          });
          // 即座に更新確認
          reg.update().catch(() => {});
        } catch (err) { console.warn('SW reg failed', err); }
      });
    }
  </script>
</body>
</html>
